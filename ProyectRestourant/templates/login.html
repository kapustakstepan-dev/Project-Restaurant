<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>


<body>
    <nav class="navbar">
        <div style="display: flex; align-items: center;">
            <a href="{{ url_for('home') }}" class="logo">RetroBite</a>
            {% if current_user.is_authenticated %}
            <span class="user-info"
                style="margin-left: 1rem; font-weight: bold; color: var(--primary-color); font-family: var(--font-heading);">{{
                current_user.nickname }}</span>
            {% endif %}
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('menu') }}" data-i18n="nav_menu">Menu</a></li>
            <li><a href="{{ url_for('my_orders') }}" data-i18n="nav_orders">My Orders</a></li>
            <li><a href="{{ url_for('my_reservations') }}" data-i18n="nav_reserved">Reservation</a></li>
            {% if current_user.is_authenticated %}
            <li><a href="{{ url_for('logout') }}" data-i18n="nav_logout">Logout</a></li>
            {% else %}
            <li><a href="{{ url_for('login') }}" data-i18n="nav_login">Login</a></li>
            {% endif %}
        </ul>
        <div class="lang-switcher">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="es">ES</button>
            <button class="lang-btn" data-lang="ua">UA</button>
        </div>
    </nav>

    <main class="container">
        <div class="retro-form animate-reveal">
            <h2 data-i18n="login_title" style="text-align: center; margin-bottom: 2rem; color: var(--primary-color);">
                Welcome Back</h2>
            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label for="email" data-i18n="email_label">Nickname</label>
                    <input type="text" id="email" class="retro-input" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password" data-i18n="password_label">Password</label>
                    <input type="password" id="password" class="retro-input" name="password" required>
                </div>
                <button type="submit" class="retro-btn" style="width: 100%; margin-top: 1rem;"
                    data-i18n="login_btn">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem;">
                Don't have an account? <a href="{{ url_for('register') }}"
                    style="color: var(--secondary-color); font-weight: bold;">Register</a>
            </p>
        </div>
    </main>

    <script src="{{ url_for('static', filename='libs/anime.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/translate.js') }}"></script>
    <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>


</body>

</html>
