<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ position.name }} | RetroBite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .position-container {
            display: flex;
            flex-wrap: wrap;
            gap: 3rem;
            margin-top: 4rem;
            align-items: center;
        }

        .position-image {
            flex: 1;
            min-width: 300px;
            height: 400px;
            background-color: var(--secondary-color);
            border: 4px solid var(--text-color);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 10px 10px 0px var(--text-color);
        }

        .position-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .position-details {
            flex: 1;
            min-width: 300px;
        }

        .position-title {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: var(--primary-color);
            text-shadow: 3px 3px 0px var(--accent-color);
        }

        .position-meta {
            font-size: 1.2rem;
            color: var(--text-color);
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .position-desc {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .position-price {
            font-size: 2.5rem;
            font-family: var(--font-heading);
            color: var(--secondary-color);
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="{{ url_for('home') }}" class="logo">RetroBite</a>
        <ul class="nav-links">
            <li><a href="{{ url_for('menu') }}" data-i18n="nav_menu" style="color: var(--secondary-color);">Menu</a></li>
            <li><a href="{{ url_for('my_orders') }}" data-i18n="nav_orders">My Orders</a></li>
            <li><a href="{{ url_for('reservation') }}" data-i18n="nav_reserved">Reservation</a></li>
        </ul>
        <div class="lang-switcher">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="es">ES</button>
            <button class="lang-btn" data-lang="ua">UA</button>
        </div>
    </nav>

    <main class="container">
        <a href="{{ url_for('menu') }}" class="retro-btn" style="margin-top: 2rem;">&larr; <span data-i18n="back_to_menu">Back to Menu</span></a>

        <div class="position-container animate-reveal">
            <div class="position-image">
                <img src="{{ position.file_name }}" alt="{{ position.name }}">
            </div>
            <div class="position-details">
                <h1 class="position-title">{{ position.name }}</h1>
                <div class="position-meta"><span data-i18n="weight_label">Weight</span>: {{ position.weight }}</div>
                <p class="position-desc">{{ position.description }}</p>

                <h3 style="margin-bottom: 0.5rem;" data-i18n="ingredients_label">Ingredients:</h3>
                <p style="line-height: 1.6; margin-bottom: 2rem;">{{ position.ingredients }}</p>

                <div class="position-price">${{ position.price }}</div>
                
                <form action="{{ url_for('position', name=position.name) }}" method="POST">
                    <div style="margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem;">
                        <label for="num" data-i18n="label_quantity">Quantity:</label>
                        <input type="number" name="num" id="num" value="1" min="1" class="retro-input" style="width: 80px;">
                    </div>
                    <button type="submit" class="retro-btn" style="font-size: 1.5rem; padding: 1rem 3rem;">
                        <span data-i18n="order_now">Order Now</span>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='libs/anime.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/translate.js') }}"></script>
    <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
