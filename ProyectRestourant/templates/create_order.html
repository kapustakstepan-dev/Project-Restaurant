<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - RetroBite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="{{ url_for('home') }}" class="logo">RetroBite</a>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('menu') }}" data-i18n="nav_menu">Menu</a></li>
            <li><a href="{{ url_for('my_orders') }}" data-i18n="nav_orders">My Orders</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="retro-form animate-reveal" style="max-width: 600px;">
            <h1 class="form-title" data-i18n="checkout_title">🛒 Checkout</h1>

            {% if basket %}
            <div class="checkout-summary">
                <ul class="order-list-summary">
                    {% for position, count in basket.items() %}
                    <li class="order-summary-item">
                        <span class="item-name"><strong>{{ position }}</strong></span>
                        <span class="item-qty">x{{ count }}</span>
                    </li>
                    {% endfor %}
                </ul>

                <form method="post" class="checkout-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button type="submit" class="retro-btn full-width" data-i18n="btn_confirm_order" style="margin-top: 2rem;">
                        Confirm & Order
                    </button>
                </form>
            </div>
            {% else %}
            <div class="empty-state">
                <p data-i18n="empty_basket_checkout">Your basket is empty.</p>
                <a href="{{ url_for('menu') }}" class="retro-btn" data-i18n="back_to_menu">Back to Menu</a>
            </div>
            {% endif %}

            <div class="form-footer">
                <a href="{{ url_for('menu') }}" class="highlight-link">&larr; Add more items</a>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='libs/anime.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/translate.js') }}"></script>
    <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
