<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>

<body>
    <nav class="navbar">
        <a href="home.html" class="logo">RetroBite</a>
        <ul class="nav-links">
            <li><a href="menu.html" data-i18n="nav_menu">Menu</a></li>
            <li><a href="login.html" data-i18n="nav_login">Login</a></li>
            <li><a href="my_orders.html" data-i18n="nav_orders">My Orders</a></li>
            <li><a href="reserved.html" data-i18n="nav_reserved">Reservation</a></li>
        </ul>
        <div class="lang-switcher">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="es">ES</button>
            <button class="lang-btn" data-lang="ua">UA</button>
        </div>
    </nav>

    <main class="container">
        <div class="retro-form animate-reveal">
            <h2 data-i18n="register_title"
                style="text-align: center; margin-bottom: 2rem; color: var(--primary-color);">Join the Club</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name" data-i18n="name_label">Full Name</label>
                    <input type="text" id="name" class="retro-input" required>
                </div>
                <div class="form-group">
                    <label for="email" data-i18n="email_label">Email Address</label>
                    <input type="email" id="email" class="retro-input" required>
                </div>
                <div class="form-group">
                    <label for="password" data-i18n="password_label">Password</label>
                    <input type="password" id="password" class="retro-input" required>
                </div>
                <button type="submit" class="retro-btn" style="width: 100%; margin-top: 1rem;"
                    data-i18n="register_btn">Register</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem;">
                Already have an account? <a href="login.html"
                    style="color: var(--secondary-color); font-weight: bold;">Login</a>
            </p>
        </div>
    </main>

    <script src="../static/libs/anime.min.js"></script>
    <script src="../static/js/translate.js"></script>
    <script src="../static/js/animations.js"></script>
    <script src="../static/js/main.js"></script>
</body>

</html>
