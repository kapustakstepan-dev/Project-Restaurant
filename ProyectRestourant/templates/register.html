<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RetroBite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="{{ url_for('home') }}" class="logo">RetroBite</a>
            {% if current_user.is_authenticated %}
            <span class="user-info">{{ current_user.nickname }}</span>
            {% endif %}
        </div>

        <ul class="nav-links">
            <li><a href="{{ url_for('menu') }}" data-i18n="nav_menu">Menu</a></li>
            <li><a href="{{ url_for('my_orders') }}" data-i18n="nav_orders">My Orders</a></li>
            <li><a href="{{ url_for('my_reservations') }}" data-i18n="nav_reserved">Reservation</a></li>
            {% if current_user.is_authenticated %}
            <li><a href="{{ url_for('logout') }}" data-i18n="nav_logout">Logout</a></li>
            {% else %}
            <li><a href="{{ url_for('login') }}" data-i18n="nav_login">Login</a></li>
            {% endif %}
        </ul>

        <div class="lang-switcher">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="es">ES</button>
            <button class="lang-btn" data-lang="ua">UA</button>
        </div>
    </nav>

    <main class="container">
        <div class="retro-form animate-reveal">
            <h2 data-i18n="register_title" class="form-title">Join the Club</h2>

            <form action="{{ url_for('register') }}" method="POST">
                <div class="form-group">
                    <label for="username" data-i18n="username_label">Username</label>
                    <input type="text" id="username" name="username" class="retro-input" required>
                </div>

                <div class="form-group">
                    <label for="email" data-i18n="email_label">Email Address</label>
                    <input type="email" id="email" name="email" class="retro-input" required>
                </div>

                <div class="form-group">
                    <label for="password" data-i18n="password_label">Password</label>
                    <input type="password" id="password" name="password" class="retro-input" required>
                </div>

                <button type="submit" class="retro-btn full-width" data-i18n="register_btn">
                    Register
                </button>
            </form>

            <p class="form-footer">
                <span data-i18n="register_footer">Already have an account?</span> 
                <a href="{{ url_for('login') }}" class="highlight-link" data-i18n="login_link">Login</a>
            </p>
        </div>
    </main>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='libs/anime.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/translate.js') }}"></script>
    <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
